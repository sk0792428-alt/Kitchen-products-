<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Kitchen Products E-commerce</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }\n        header { background-color: #4CAF50; color: white; padding: 15px; text-align: center; }\n        .product { border: 1px solid #ccc; border-radius: 5px; margin: 10px; padding: 10px; text-align: center; }\n        .product img { max-width: 100%; height: auto; }\n        .cart { margin: 20px; }\n    </style>\n</head>\n<body>\n    <header>\n        <h1>Kitchen Products</h1>\n    </header>\n    <div class="cart">\n        <h2>Your Cart</h2>\n        <ul id="cart-items"></ul>\n        <p id="total-price">Total: $0</p>\n    </div>\n    <div class="products">\n        <div class="product">\n            <img src="product1.jpg" alt="Product 1">\n            <h3>Product 1</h3>\n            <p>$10.00</p>\n            <button onclick="addToCart(10, 'Product 1')">Add to Cart</button>\n        </div>\n        <div class="product">\n            <img src="product2.jpg" alt="Product 2">\n            <h3>Product 2</h3>\n            <p>$15.00</p>\n            <button onclick="addToCart(15, 'Product 2')">Add to Cart</button>\n        </div>\n        <!-- Add more products as needed -->\n    </div>\n    <script>\n        let total = 0;\n        function addToCart(price, productName) {\n            total += price;\n            const cartItems = document.getElementById('cart-items');\n            const li = document.createElement('li');\n            li.textContent = productName + ': $' + price;\n            cartItems.appendChild(li);\n            const totalPrice = document.getElementById('total-price');\n            totalPrice.textContent = 'Total: $' + total;\n        }\n    </script>\n</body>\n</html>
